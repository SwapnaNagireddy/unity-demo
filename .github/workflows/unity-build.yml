name: Unity Build Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: self-hosted # Mac server!
    
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Run Build Script
      env:
        # trigger
        UNITY_PATH: "/Applications/Unity/Hub/Editor/6000.4.2f1/Unity.app/Contents/MacOS/Unity"
      run: python3 build_pipeline.py

    - name: Upload Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: production-build
        path: Builds/Mac/